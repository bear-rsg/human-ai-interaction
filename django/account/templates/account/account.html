{% extends "base.html" %}
{% load settings_value %}
{% load static %}

{% block main %}

<section class="container">
    <h2>Account</h2>
</section>

<section class="container" id="account-mydetails">
    <h3>My Details</h3>
    <p>
        <strong>Username:</strong> <span>{{ user.username }}</span>
    </p>
    <p>
        <strong>Password:</strong> <span><a href="{% url 'account:change-password' %}">Change password</a></span>
    </p>
</section>

<section class="container" id="account-logout">
    <h3>Logout</h3>
    <p>
        Thanks for using Human-AI Interaction platform.
    </p>
    <p>
        <!-- Logout must be a form that sends a post request, or will not work -->
        <form action="{% url 'account:logout' %}" method="post">
            {% csrf_token %}
            <button type="submit">Logout</button>
        </form>
    </p>
</section>

{% endblock %}
