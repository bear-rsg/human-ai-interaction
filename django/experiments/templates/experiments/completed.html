{% extends "base.html" %}
{% load static %}
{% block main %}

<div id="experiments-completed" class="container">
    <h2>Experiment Completed</h2>

    <p>
        Thank you for completing the <strong>{{ experiment_instance.experiment.name }}</strong> experiment. Please complete the below survey.
    </p>

    <iframe id="experiments-completed-survey" src="{{ experiment_instance.experiment.survey_url }}?username={{ user.username }}"></iframe>

</div>

{% endblock %}
