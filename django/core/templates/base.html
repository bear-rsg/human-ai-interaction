{% load static settings_value %}

<!DOCTYPE html>
<html lang="en">

    <head>
        <title>Human-AI Interaction</title>

        <!--Meta-->
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Human-AI Interaction is a research project at the University of Birmingham">
        <meta name="author" content="University of Birmingham">

        <!-- CSS -->
        <!-- Bootstrap -->
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">

        <!-- Google Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

        <!-- Custom -->
        <link rel="stylesheet" type="text/css" href="{% static 'css/reset.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/custom.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/custom_small.css' %}">
        <link rel="stylesheet" type="text/css" href="{% static 'css/custom_large.css' %}">

        <!--Set the favicon-->
        <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">

        <!-- JavaScript -->
        <!-- jQuery -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.min.js" integrity="sha384-+sLIOodYLS7CIrQpBjl+C7nPvqq+FbNUBDunl/OZv93DB7Ln/533i8e/mZXLi/P+" crossorigin="anonymous"></script>
    </head>

    <body>

        <!-- Navigation bar -->
        <nav class="navbar fixed-top navbar-expand-lg">
            <!-- Title -->
            <a class="navbar-brand" href="{% url 'general:welcome' %}">
                <h1>Human-AI<br>Interaction</h1>
            </a>
            <!-- Nav toggle button (for small screens) -->
            <button class="navbar-toggler" type="button" title="navbartoggle" data-toggle="collapse" data-target="#navbarNavDropdown" aria-controls="navbarNavDropdown" aria-expanded="false">
                <i class="fas fa-bars"></i>
            </button>
            <!-- Nav list -->
            <div class="collapse navbar-collapse" id="navbarNavDropdown">
                <ul class="navbar-nav ml-auto">
                    {% if user.is_authenticated %}
                        <!-- Welcome -->
                        <li class="nav-item">
                            <a class="nav-link{% if request.path == "/" %} active{% endif %}" href="{% url 'general:welcome' %}">
                                Welcome
                            </a>
                        </li>
                        <!-- Experiments -->
                        <li class="nav-item">
                            <a class="nav-link{% if "/experiments/" in request.path %} active{% endif %}" href="{% url 'experiments:index' %}">
                                Experiments
                            </a>
                        </li>
                        {% if user.is_staff %}
                            <!-- Account -->
                            <li class="nav-item">
                                <a class="nav-link{% if "/account/" in request.path %} active{% endif %}" href="{% url 'account:account' %}">
                                    Account
                                </a>
                            </li>
                            <!-- Admin -->
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'admin:index' %}">
                                    Admin
                                </a>
                            </li>
                        {% endif %}
                    {% endif %}
                </ul>
            </div>
        </nav>

        <!-- Main -->
        <main id="main">
            {% block main %}
            {% endblock %}
        </main>

        <!-- Google tag (gtag.js) -->
        <script async src="https://www.googletagmanager.com/gtag/js?id=G-2FR9Y277VF"></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            gtag('js', new Date());
            gtag('config', 'G-2FR9Y277VF');
        </script>

        <!-- Cookies popup message (must be at bottom of body) -->
        <script src="{% static 'js/cookiesmsg.js' %}"></script>
    </body>
</html>
